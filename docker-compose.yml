# One command to run the whole assessment:  docker compose up --build
#
# 1. starts Neo4j (the knowledge graph store)
# 2. waits for it to be healthy
# 3. runs the pipeline for Firm A, then Firm B, WITHOUT any code edit between
#    the two runs — only the --firm flag (which selects a config file) changes.
#
# Reports + per-figure JSON + reconciliation land in ./output (bind-mounted).
services:
  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/testpassword
      NEO4J_PLUGINS: '[]'
    ports:
      - "7474:7474"   # browser (optional, for manually inspecting the graph)
      - "7687:7687"   # bolt
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  app:
    build: .
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      # Optional — set these (or use a .env file) to enable the live DeepSeek
      # narrative. Left empty, the system uses a deterministic mock narrative
      # and STILL produces every figure from the engine.
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    volumes:
      - ./output:/app/output
      - ./audit:/app/audit
    # Produce BOTH firms' reports in one run, no code edit between them.
    command: >
      sh -c "python run.py --firm A &&
             python run.py --firm B &&
             python run.py --reconcile-report"

  # ----------------------------------------------------------------------- #
  # OPTIONAL web product (the "cherry on top"). Behind the `web` profile so   #
  # the graded single command `docker compose up` is unaffected. Start with:  #
  #     docker compose --profile web up --build                               #
  # then open http://localhost:3000                                           #
  # ----------------------------------------------------------------------- #
  api:
    profiles: ["web"]
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      API_GRAPH_BACKEND: embedded   # stateless per request; identical results
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
      - ./audit:/app/audit

  web:
    profiles: ["web"]
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      - api
    environment:
      # The Next server proxies /api/* to the api service inside the network.
      API_PROXY_TARGET: http://api:8000
    ports:
      - "3000:3000"
